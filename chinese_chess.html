        * {

        .all {
            width: 1100px;
            height: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

        .container {
            width: 840px;
            height: 920px;
            margin: auto;
            /* background: gray; */
            display: flex;
            border: 2px solid #000;
        }

        .board {
            display: flex;
            width: 656px;
            height: 736px;
            /* background: lightblue; */
            margin: auto;
            flex-wrap: wrap;
            flex-direction: row;
            border: 1px solid #000;

        }


        .a {
            width: 80px;
            height: 80px;
            border: 1px solid #000;
            position: relative;

        }

        .left::before {
            content: "";
            width: 141%;
            height: 2px;
            position: absolute;
            background: #000;
            transform: rotate(45deg);
            transform-origin: left top;
        }

        .right::before {
            content: "";
            width: 141%;
            height: 2px;
            position: absolute;
            background: #000;
            transform: rotate(-45deg);
            transform-origin: right top;
            top: 0;
            right: 0;
        }

        .b {
            width: 656px;
            height: 80px;
            border: 1px solid #000;
            font-size: 54px;
            text-align: center;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        .piece {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #000;
            background: #FFF;
            color: #000;
            font-size: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
        }

        .piece-c {
